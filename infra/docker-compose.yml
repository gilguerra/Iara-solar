services:
  postgres:
    image: postgres:16-alpine
    container_name: iara-solar-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iara-solar-net

  redis:
    image: redis:7-alpine
    container_name: iara-solar-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes"
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iara-solar-net

  n8n:
    image: n8nio/n8n:latest
    container_name: iara-solar-n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED}

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      EXECUTIONS_MODE: regular
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=iara-solar-net"
      - "traefik.http.routers.n8n.rule=Host(`n8n.iarasolar.com`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=le"
      - "traefik.http.routers.n8n.middlewares=ratelimit-default"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
#    ports:
#      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/n8n:/home/node/.n8n
    networks:
      - iara-solar-net

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: iara-solar-api
    restart: unless-stopped
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=iara-solar-net"
      - "traefik.http.routers.api.rule=Host(`api.iarasolar.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.routers.api.middlewares=ratelimit-api"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
      # Rate limit middleware definitions (defined once, reused by all services)
      - "traefik.http.middlewares.ratelimit-api.ratelimit.average=30"
      - "traefik.http.middlewares.ratelimit-api.ratelimit.burst=60"
      - "traefik.http.middlewares.ratelimit-api.ratelimit.period=1m"
      - "traefik.http.middlewares.ratelimit-default.ratelimit.average=20"
      - "traefik.http.middlewares.ratelimit-default.ratelimit.burst=40"
      - "traefik.http.middlewares.ratelimit-default.ratelimit.period=1m"
    environment:
      HOST: 0.0.0.0
      PORT: ${API_PORT}
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}

      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${APP_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
#    ports:
#      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iara-solar-net

  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # Rate limiting defaults (applied per middleware, defined below)
      # Let's Encrypt
      - "--certificatesresolvers.le.acme.email=gilguerra.1983@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      # Access log for fail2ban
      - "--accesslog=true"
      - "--accesslog.filepath=/logs/access.log"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/acme.json:/acme.json"
      - "./traefik/logs:/logs"
    networks:
      - iara-solar-net
      - traefik-public

networks:
  iara-solar-net:
    external: true
  traefik-public:
    external: true
